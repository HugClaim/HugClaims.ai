    <meta
      http-equiv="refresh"
      content="0; url=/pages/careers/career-forward-deployed-engineer.html"
    />
    <script>
      (function () {
        var target =
          "/pages/careers/career-forward-deployed-engineer.html" +
          window.location.search +
          window.location.hash;
        if (
          window.location.pathname +
            window.location.search +
            window.location.hash !==
          target
        ) {
          window.location.replace(target);
        }
      })();
    </script>
  </head>
